<!doctype html>
<html lang="en" data-theme="corporate">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Apply theme before first paint to prevent flash -->
		<script>
			(function () {
				var stored = null;
				try { stored = localStorage.getItem('cashcow-theme'); } catch (e) {}
				document.documentElement.setAttribute('data-theme', stored === 'night' ? 'night' : 'corporate');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
